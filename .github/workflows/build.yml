name: DeployTest

on:
  push:

jobs:
  versionning:
    name: Versionning
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.genver.outputs.version }}
    steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        ref: ${{ github.ref }}
        fetch-depth: 0

    - name: Generate Version
      id: genver
      uses: codacy/git-version@e81d6fdad74f9e114420d69ca8b47658f1182afb # 2.8.7
      with:
        minor-identifier: "feat:"
        release-branch: release
        dev-branch: main
        prefix: v

    - name: Print version
      run: echo VERSION ${{ steps.genver.outputs.version }} >> $GITHUB_STEP_SUMMARY

  formatCsharp:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        solution:
          - AllSamples.sln
          - csharp/native/Demo.sln
    steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        ref: ${{ github.ref }}
        fetch-depth: 0
        submodules: true

    - name: Install .NET Core
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
      with:
        dotnet-version: 8.x

    - name: Install ReSharper
      run: |
        dotnet tool install -g JetBrains.ReSharper.GlobalTools --version 2025.1.2

    - name: Restore
      run: |
        dotnet restore ${{ matrix.solution }}

    - name: Reformat
      run: |
        jb cleanupcode ${{ matrix.solution }}

    - name: Check Diff
      id: check-diff
      run: |
        DIFF="$(git diff --name-only)"

        if [ -z "$DIFF" ]; then
          echo "OK: Format is clean"
        else
          echo "Error: Format was not clean"
          echo "List of files:"
          echo "$DIFF"
          git diff
          exit 1
        fi
    - name: Generate patch
      if: ${{ failure() && steps.check-diff.conclusion == 'failure' }}
      run: |
        git diff > patch-csharp.diff
        
    - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      if: ${{ failure() && steps.check-diff.conclusion == 'failure' }}
      with:
        name: patch-csharp
        path: ./patch-csharp.diff
        
  buildProjects:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        ref: ${{ github.head_ref }}

    - name: Install .NET Core
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
      with:
        dotnet-version: 8.x

    - name: Build the package
      run: |
        dotnet build AllSamples.sln

  setupDemoNames:
    runs-on: ubuntu-latest
    outputs:
      csharp-demo-names: ${{ steps.set-csharp-demos.outputs.csharp-demo-names }}
      csharp-demo-dirs: ${{ steps.set-csharp-demos.outputs.csharp-demo-dirs }}
      cpp-demo-names: ${{ steps.set-cpp-demos.outputs.cpp-demo-names }}
      cpp-demo-dirs: ${{ steps.set-cpp-demos.outputs.cpp-demo-dirs }}
      java-demo-names: ${{ steps.set-java-demos.outputs.java-demo-names }}
      java-demo-worker-dirs: ${{ steps.set-java-demos.outputs.java-demo-worker-dirs }}
      java-demo-names-to-worker: ${{ steps.set-java-demos.outputs.java-demo-names-to-worker }}
    steps:
      - name: CSharp demos
        id: set-csharp-demos
        run: |
          CSHARP_DEMO_DIRS='["HelloWorld","MultipleResults","SubTasking","LinearSubTasking","DynamicSubmission"]'
          CSHARP_DEMO_NAMES=$(echo "${CSHARP_DEMO_DIRS}" | jq -c 'map(ascii_downcase)')
          echo "csharp-demo-dirs=${CSHARP_DEMO_DIRS}" >> $GITHUB_OUTPUT
          echo "csharp-demo-names=${CSHARP_DEMO_NAMES}" >> $GITHUB_OUTPUT

      - name: Cpp demos
        id: set-cpp-demos
        run: |
          CPP_DEMO_DIRS='["HelloWorldAPI","HelloWorldSDK","HelloWorldC","ChainedArithmetic"]'
          CPP_DEMO_NAMES=$(echo "${CPP_DEMO_DIRS}" | jq -c 'map(ascii_downcase)')
          echo "cpp-demo-dirs=${CPP_DEMO_DIRS}" >> $GITHUB_OUTPUT
          echo "cpp-demo-names=${CPP_DEMO_NAMES}" >> $GITHUB_OUTPUT

      - name: Java demos
        id: set-java-demos
        run: |
          JAVA_DEMO_WORKER_DIRS='["workers/hello-world-worker","workers/sum-worker"]'
          JAVA_DEMO_NAMES='["HelloWorld","SharedBlob","TaskDependencies"]'
          JAVA_DEMO_NAMES_TO_WORKER='[{"HelloWorld":"hello-world-worker"},{"SharedBlob":"sum-worker"},{"TaskDependencies":"sum-worker"}]'
          echo "java-demo-worker-dirs=${JAVA_DEMO_WORKER_DIRS}" >> $GITHUB_OUTPUT
          echo "java-demo-names=${JAVA_DEMO_NAMES}" >> $GITHUB_OUTPUT
          echo "java-demo-names-to-worker=${JAVA_DEMO_NAMES_TO_WORKER}" >> $GITHUB_OUTPUT

  buildCSharpImages:
    runs-on: ubuntu-latest
    needs:
      - versionning
      - buildProjects
      - setupDemoNames
    env:
      VERSION: ${{ needs.versionning.outputs.version }}
    strategy:
      fail-fast: true
      matrix:
        demodir: ${{ fromJson(needs.setupDemoNames.outputs.csharp-demo-dirs) }}
        role: [Client, Worker]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Login to Docker Hub
        run: echo ${{ secrets.DOCKER_HUB_TOKEN }} | docker login -u ${{ secrets.DOCKER_HUB_LOGIN }} --password-stdin

      - name: Build Docker image
        run: |
          IMAGE_NAME="dockerhubaneo/armonik_demo_$(echo '${{ matrix.demodir }}' | tr '[:upper:]' '[:lower:]')_$(echo '${{ matrix.role }}' | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV
          docker build \
            -t ${IMAGE_NAME}:${VERSION} \
            -f ./csharp/native/${{ matrix.demodir }}/${{ matrix.role }}/Dockerfile \
            csharp/native/
      - name: Push Docker image
        run: docker push ${IMAGE_NAME}:${VERSION}

  buildCppImages:
    runs-on: ubuntu-latest
    needs:
      - versionning
      - setupDemoNames
    env:
      VERSION: ${{ needs.versionning.outputs.version }}
    strategy:
      fail-fast: true
      matrix:
        demodir: ${{ fromJson(needs.setupDemoNames.outputs.cpp-demo-dirs) }}
        role: [client, worker]
        distro: ['']
        include:
          - demodir: HelloWorldAPI
            role: client
            distro: ubi8
          - demodir: HelloWorldAPI
            role: worker
            distro: ubi8
          - demodir: HelloWorldAPI
            role: client
            distro: debian
          - demodir: HelloWorldAPI
            role: worker
            distro: debian
          - demodir: HelloWorldSDK
            role: client
            distro: ubi8
          - demodir: HelloWorldSDK
            role: worker
            distro: ubi8
          - demodir: HelloWorldSDK
            role: client
            distro: debian
          - demodir: HelloWorldSDK
            role: worker
            distro: debian
        exclude:
          - demodir: HelloWorldAPI
            distro: ''
          - demodir: HelloWorldSDK
            distro: ''
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Login to Docker Hub
        run: echo ${{ secrets.DOCKER_HUB_TOKEN }} | docker login -u ${{ secrets.DOCKER_HUB_LOGIN }} --password-stdin

      - name: Build Docker image
        run: |
          API_VERSION=$(curl -fsS https://raw.githubusercontent.com/aneoconsulting/ArmoniK/main/versions.tfvars.json | jq -r '.armonik_versions.api')
          SDK_VERSION=$(curl -fsS https://raw.githubusercontent.com/aneoconsulting/ArmoniK/main/versions.tfvars.json | jq -r '.armonik_versions.extcpp')
          IMAGE_NAME="dockerhubaneo/armonik_demo_cpp_$(echo '${{ matrix.demodir }}' | tr '[:upper:]' '[:lower:]')_${{ matrix.role }}"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV
          DEMO_DIR="${{ matrix.demodir }}"
          DEMO_DIR="${DEMO_DIR/HelloWorldSDK_C/HelloWorldC}"
          DISTRO="${{ matrix.distro }}"
          if [ -n "${DISTRO}" ]; then
            DOCKERFILE="Dockerfile.${DISTRO}"
            IMAGE_TAG="${VERSION}-${DISTRO}"
          else
            DOCKERFILE="Dockerfile"
            IMAGE_TAG="${VERSION}"
          fi
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          docker build \
            -t ${IMAGE_NAME}:${IMAGE_TAG} \
            -f ./cpp/${DEMO_DIR}/${{ matrix.role }}/${DOCKERFILE} \
            --build-arg="API_VERSION=${API_VERSION}" \
            --build-arg="SDK_VERSION=${SDK_VERSION}" \
            cpp/${DEMO_DIR}/${{ matrix.role }}/
      - name: Push Docker image
        run: docker push ${IMAGE_NAME}:${IMAGE_TAG}

  buildJavaImages:
    runs-on: ubuntu-latest
    needs:
      - versionning
      - setupDemoNames
    env:
      VERSION: ${{ needs.versionning.outputs.version }}
    strategy:
      fail-fast: true
      matrix:
        demodir: ${{ fromJson(needs.setupDemoNames.outputs.java-demo-worker-dirs) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Java and Maven
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '17'
          cache: 'maven'
          cache-dependency-path: 'java/${{ matrix.demodir }}/pom.xml'
      - name: Login to Docker Hub
        run: echo ${{ secrets.DOCKER_HUB_TOKEN }} | docker login -u ${{ secrets.DOCKER_HUB_LOGIN }} --password-stdin

      - name: Build Docker image
        run: |
          demodir="${{ matrix.demodir }}" && stripped=${demodir#*/}
          IMAGE_NAME="dockerhubaneo/armonik_demo_java_${stripped}"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV
          cd java/${{ matrix.demodir }}
          ./mvnw package -Djib.to.image=${IMAGE_NAME}:${VERSION}

      - name: Push Docker image
        run: docker push ${IMAGE_NAME}:${VERSION}

  CSharpSamples:
    runs-on: ubuntu-latest
    needs:
      - versionning
      - buildCSharpImages
      - setupDemoNames
    strategy:
      fail-fast: false
      matrix:
        demo: ${{ fromJson(needs.setupDemoNames.outputs.csharp-demo-names) }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref }}
      - name: Install Dependencies
        uses: aneoconsulting/ArmoniK.Action.Deploy/dependencies@main
        with:
            docker: true
            terraform: true
            k3s: true
            aws: true

      - name: Checkout Infra
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
            repository: aneoconsulting/ArmoniK
            path: infra

      - name: Deploy
        id: deploy
        uses: aneoconsulting/ArmoniK.Action.Deploy/deploy@main
        with:
          working-directory: ${{ github.workspace }}/infra
          type: localhost
          override-compute: true
          override-worker-version: ${{ needs.versionning.outputs.version }}
          override-worker-image:  dockerhubaneo/armonik_demo_${{ matrix.demo }}_worker
          override-worker-partition: ${{ matrix.demo }}
          log-suffix: ${{ matrix.demo }}

      - name: Run Demo Client
        timeout-minutes: 10
        run: |
          export Grpc__Endpoint=$(jq -r .armonik.control_plane_url "${{ steps.deploy.outputs.generated-folder }}/armonik-output.json")
          docker run --rm dockerhubaneo/armonik_demo_${{ matrix.demo }}_client:${{ needs.versionning.outputs.version }} --endpoint $Grpc__Endpoint --partition ${{ matrix.demo }}

  testInfraWorker:
    needs:
      - versionning
      - buildProjects
    strategy:
      matrix:
        scenario:
          - --nbTask 224  --nbInputBytes 4029815 --nbOutputBytes 226016  --workLoadTimeInMs 10

      fail-fast: false
    runs-on: ubuntu-latest
    env:
      ARMONIK_SHARED_HOST_PATH: ${{ github.workspace }}/infra/infrastructure/quick-deploy/localhost/all-in-one/data/
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.head_ref }}

      - name: Install Dependencies
        uses: aneoconsulting/ArmoniK.Action.Deploy/dependencies@main
        with:
          docker: true
          terraform: true
          k3s: true
          aws: true

      - name: Checkout Infra
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: aneoconsulting/ArmoniK
          path: infra

      - name: Deploy
        id: deploy
        uses: aneoconsulting/ArmoniK.Action.Deploy/deploy@main
        with:
          working-directory: ${{ github.workspace }}/infra
          type: localhost
          override-compute: true
          override-worker-version: 0.19.3
          override-worker-image: dockerhubaneo/armonik_worker_dll
          override-worker-partition: default
          shared-data-folder: ${{ env.ARMONIK_SHARED_HOST_PATH }}
          log-suffix: infraWorker

      - name: Run UnifiedAPI
        timeout-minutes: 15
        run: |
          cd tools/tests
          bash -x ./unified_api.sh

      - name: Run StressTests
        timeout-minutes: 15
        run: |
          cd tools/tests
          bash -x ./stress-tests.sh -- stressTest ${{ matrix.scenario }}
      - name: Copy logs
        if: always()
        shell: bash
        run: |
          set -e
          mkdir -p /tmp/armoniklogs
          sudo find /var/log/pods/ -maxdepth 1 -iname 'armonik_*' -exec cp -rL '{}' /tmp/armoniklogs/ ';'
          sudo chown $USER -R /tmp/armoniklogs
          find /tmp/armoniklogs -name "*.log"

      - name: Store logs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: Logs Worker
          path: /tmp/armoniklogs/**/*.log
          retention-days: 5
          
      - name: Destroy deployment
        if: success() || failure()
        uses: aneoconsulting/ArmoniK.Action.Deploy/destroy@main
        with:
          working-directory: ${{ github.workspace }}/infra
          type: localhost

  CppSamples:
    runs-on: ubuntu-latest
    needs:
      - versionning
      - buildCppImages
      - setupDemoNames
    strategy:
      fail-fast: false
      matrix:
        demo: ${{ fromJson(needs.setupDemoNames.outputs.cpp-demo-names) }}
        distro: ['']
        include:
          - demo: helloworldapi
            distro: ubi8
          - demo: helloworldapi
            distro: debian
          - demo: helloworldsdk
            distro: ubi8
          - demo: helloworldsdk
            distro: debian
        exclude:
          - demo: helloworldapi
            distro: ''
          - demo: helloworldsdk
            distro: ''
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref }}
      - name: Install Dependencies
        uses: aneoconsulting/ArmoniK.Action.Deploy/dependencies@main
        with:
            docker: true
            terraform: true
            k3s: true
            aws: true

      - name: Checkout Infra
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
            repository: aneoconsulting/ArmoniK
            path: infra

      - name: Prepare SDK sample
        if: ${{ !contains(matrix.demo, 'api') }}
        run: |
          case "${{ matrix.demo }}" in
            helloworldc)
              SO_FILE="libArmoniK.Samples.C.Hello.Worker.so"
              DEST=${{ github.workspace }}/infra/infrastructure/quick-deploy/localhost/all-in-one/data
              ;;
            chainedarithmetic)
              # .so is uploaded by the client as a blob; copy it to a local dir the client container can mount.
              SO_FILE="libArmoniK.Samples.Cpp.ChainedArithmetic.Worker.so"
              DEST=/tmp/so-libs
              mkdir -p ${DEST}
              ;;
            *)
              SO_FILE="libArmoniK.Samples.Cpp.Hello.SDK.Worker.so"
              DEST=${{ github.workspace }}/infra/infrastructure/quick-deploy/localhost/all-in-one/data
              ;;
          esac
          DISTRO="${{ matrix.distro }}"
          WORKER_TAG="${{ needs.versionning.outputs.version }}${DISTRO:+-${DISTRO}}"
          docker create --name so_exporter dockerhubaneo/armonik_demo_cpp_${{ matrix.demo }}_worker:${WORKER_TAG}
          docker cp so_exporter:app/${SO_FILE} ${DEST}
          docker remove so_exporter
          SDK_VERSION=$(curl -fsS https://raw.githubusercontent.com/aneoconsulting/ArmoniK/main/versions.tfvars.json | jq -r '.armonik_versions.extcpp')
          echo "SDK_VERSION=${SDK_VERSION}" >> $GITHUB_ENV
          echo "SO_FILE=${SO_FILE}" >> $GITHUB_ENV

      - name: Deploy
        id: deploy
        uses: aneoconsulting/ArmoniK.Action.Deploy/deploy@main
        with:
          working-directory: ${{ github.workspace }}/infra
          type: localhost
          override-compute: true
          override-worker-version: ${{ !contains(matrix.demo, 'api') && format('{0}-ubuntu', env.SDK_VERSION) || format('{0}-{1}', needs.versionning.outputs.version, matrix.distro) }}
          override-worker-image: ${{ !contains(matrix.demo, 'api') && 'dockerhubaneo/armonik-sdk-cpp-dynamicworker' || format('dockerhubaneo/armonik_demo_cpp_{0}_worker', matrix.demo) }}
          override-worker-partition: ${{ matrix.demo }}
          log-suffix: ${{ matrix.distro && format('{0}-{1}', matrix.demo, matrix.distro) || matrix.demo }}

      - name: Run Demo Client
        timeout-minutes: 10
        run: |
          export Grpc__Endpoint=$(jq -r .armonik.control_plane_url "${{ steps.deploy.outputs.generated-folder }}/armonik-output.json")
          DISTRO="${{ matrix.distro }}"
          CLIENT_TAG="${{ needs.versionning.outputs.version }}${DISTRO:+-${DISTRO}}"
          if [ "${{ matrix.demo }}" = "chainedarithmetic" ]; then
            docker run --rm \
              -v /tmp/so-libs:/so-libs \
              -e GrpcClient__Endpoint="${Grpc__Endpoint}" \
              -e PartitionId="${{ matrix.demo }}" \
              -e Worker__LibraryPath="/so-libs/${SO_FILE}" \
              dockerhubaneo/armonik_demo_cpp_${{ matrix.demo }}_client:${CLIENT_TAG}
          else
            docker run --rm \
              -e GrpcClient__Endpoint="${Grpc__Endpoint}" \
              -e PartitionId="${{ matrix.demo }}" \
              dockerhubaneo/armonik_demo_cpp_${{ matrix.demo }}_client:${CLIENT_TAG}
          fi

  JavaSamples:
    runs-on: ubuntu-latest
    needs:
      - versionning
      - buildJavaImages
      - setupDemoNames
    strategy:
      fail-fast: false
      matrix:
        demo: ${{ fromJson(needs.setupDemoNames.outputs.java-demo-names) }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref }}

      - name: Install Dependencies
        uses: aneoconsulting/ArmoniK.Action.Deploy/dependencies@main
        with:
            docker: true
            terraform: true
            k3s: true
            aws: true

      - name: Checkout Infra
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
            repository: aneoconsulting/ArmoniK
            path: infra

      - name: Figure out correct worker
        id: get-worker
        run: |
          DEMO2WORKER='${{ needs.setupDemoNames.outputs.java-demo-names-to-worker }}'
          worker=$(echo $DEMO2WORKER | jq -r --arg name "${{ matrix.demo }}" 'map(select(.[$name])) | .[0][$name]')
          echo WORKER_SUFFIX=$worker >> $GITHUB_ENV
          echo PARTITION_NAME=$(echo '${{ matrix.demo }}' | tr '[:upper:]' '[:lower:]') >> $GITHUB_ENV
          
      - name: Deploy
        id: deploy
        uses: aneoconsulting/ArmoniK.Action.Deploy/deploy@main
        with:
          working-directory: ${{ github.workspace }}/infra
          type: localhost
          override-compute: true
          override-worker-socket: tcp
          override-worker-version: ${{ needs.versionning.outputs.version }}
          override-worker-image: dockerhubaneo/armonik_demo_java_${{ env.WORKER_SUFFIX }}
          override-worker-partition: ${{ env.PARTITION_NAME }}
          log-suffix: ${{ matrix.demo }}

      - name: Setup Java and Maven
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '17'
          cache: 'maven'
          cache-dependency-path: 'java/client/pom.xml'

      - name: Run Demo Client
        timeout-minutes: 10
        run: |
          cd java/client
          PARTITION_NAME=$(echo '${{ matrix.demo }}' | tr '[:upper:]' '[:lower:]')
          ./mvnw compile exec:java -D"fr.aneo.armonik.client.samples.partition=$PARTITION_NAME" -Dexec.mainClass="fr.aneo.armonik.client.samples.${{ matrix.demo }}"

  CppInterop:
    runs-on: ubuntu-latest
    needs:
      - versionning
      - buildCppImages
      - setupDemoNames
    strategy:
      fail-fast: false
      matrix:
        demo: [javaClientCppWorker, csharpClientCppWorker]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref }}
      - name: Install Dependencies
        uses: aneoconsulting/ArmoniK.Action.Deploy/dependencies@main
        with:
            docker: true
            terraform: true
            k3s: true
            aws: true

      - name: Checkout Infra
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
            repository: aneoconsulting/ArmoniK
            path: infra

      - name: Prepare SDK sample
        run: |
          SO_FILE="libArmoniK.Samples.Cpp.ChainedArithmetic.Worker.so"
          DEST=/tmp/so-libs
          mkdir -p ${DEST}
          docker create --name so_exporter dockerhubaneo/armonik_demo_cpp_chainedarithmetic_worker:${{ needs.versionning.outputs.version }}
          docker cp so_exporter:app/${SO_FILE} ${DEST}
          docker remove so_exporter
          SDK_VERSION=$(curl -fsS https://raw.githubusercontent.com/aneoconsulting/ArmoniK/main/versions.tfvars.json | jq -r '.armonik_versions.extcpp')
          echo "SDK_VERSION=${SDK_VERSION}" >> $GITHUB_ENV
          echo "SO_FILE=${SO_FILE}" >> $GITHUB_ENV
          echo "PARTITION_NAME=$(echo '${{ matrix.demo }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Deploy
        id: deploy
        uses: aneoconsulting/ArmoniK.Action.Deploy/deploy@main
        with:
          working-directory: ${{ github.workspace }}/infra
          type: localhost
          override-compute: true
          override-worker-version:  ${{ format('{0}-ubuntu', env.SDK_VERSION) }}
          override-worker-image: dockerhubaneo/armonik-sdk-cpp-dynamicworker
          override-worker-partition: ${{ env.PARTITION_NAME }}
          log-suffix: ${{ env.PARTITION_NAME }}

      - name: Setup Java and Maven
        if: ${{ matrix.demo == 'javaClientCppWorker' }}
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '17'
          cache: 'maven'
          cache-dependency-path: 'java/client/pom.xml'

      - name: Install .NET Core
        if: ${{ matrix.demo == 'csharpClientCppWorker' }}
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 8.x

      - name: Run Java Demo Client
        if: ${{ matrix.demo == 'javaClientCppWorker' }}
        timeout-minutes: 10
        run: |
          cd java/client
          ./mvnw compile exec:java -D"fr.aneo.armonik.client.samples.partition=$PARTITION_NAME" -D"fr.aneo.armonik.client.samples.dynlib.path=/tmp/so-libs/${SO_FILE}" -Dexec.mainClass="fr.aneo.armonik.client.samples.CppDynamicLibrary"

      - name: Run C# Demo Client
        if: ${{ matrix.demo == 'csharpClientCppWorker' }}
        timeout-minutes: 10
        run: |
          export Grpc__EndPoint=$(jq -r .armonik.control_plane_url "${{ steps.deploy.outputs.generated-folder }}/armonik-output.json")
          dotnet run --project csharp/sdk/CppDynamicLibrary/CppDynamicLibrary.csproj -- \
            --LibraryPath /tmp/so-libs/${SO_FILE} \
            --Partition $PARTITION_NAME
